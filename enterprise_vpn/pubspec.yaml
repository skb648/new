name: enterprise_vpn
description: Enterprise Proxy & Network Routing VPN Application - Production-ready secure VPN tunnel with custom HTTP headers and SNI configuration support.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.0.0
  permission_handler: ^11.3.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^5.0.2
  network_info_plus: ^5.0.2
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  uuid: ^4.2.2
  logger: ^2.0.2+1
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  gap: ^3.0.1
  flutter_slidable: ^3.0.1
  modal_bottom_sheet: ^3.0.0-pre
  lottie: ^3.0.0
  fl_chart: ^0.66.0
  intl: ^0.18.1
  timezone: ^0.9.2
  background_fetch: ^1.2.1
  workmanager: ^0.5.2
  flutter_foreground_task: ^6.1.0
  vpn_service: ^0.0.1
  system_proxy: ^0.0.1
  tray_manager: ^0.2.3
  window_manager: ^0.3.8
  local_auth: ^2.1.8
  cryptography: ^2.7.0
  encrypt: ^5.0.1
  pointycastle: ^3.7.3
  convert: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  retrofit_generator: ^8.0.6
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.8
  mockito: ^5.4.4
  bloc_test: ^9.1.5
  integration_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter_native_splash:
  color: "#1A1A2E"
  image: assets/icon/splash_logo.png
  android: true
  android_gravity: center
  fullscreen: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icon/
    - assets/animations/
    - assets/images/
    - assets/config/

  fonts:
    - family: SamsungOne
      fonts:
        - asset: assets/fonts/SamsungOne-400.ttf
          weight: 400
        - asset: assets/fonts/SamsungOne-500.ttf
          weight: 500
        - asset: assets/fonts/SamsungOne-600.ttf
          weight: 600
        - asset: assets/fonts/SamsungOne-700.ttf
          weight: 700
    - family: SamsungSharpSans
      fonts:
        - asset: assets/fonts/SamsungSharpSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/SamsungSharpSans-Bold.ttf
          weight: 700
