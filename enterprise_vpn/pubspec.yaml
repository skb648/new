name: enterprise_vpn
description: Enterprise Proxy & Network Routing VPN Application - Production-ready secure VPN tunnel with custom HTTP headers and SNI configuration support.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Network
  connectivity_plus: ^5.0.2
  
  # UI Components
  flutter_animate: ^4.3.0
  flutter_local_notifications: ^17.0.0
  
  # Utilities
  uuid: ^4.2.2
  logger: ^2.0.2+1
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icon/
    - assets/animations/
    - assets/images/
    - assets/config/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter_native_splash:
  color: "#1A1A2E"
  image: assets/icon/splash_logo.png
  android: true
  android_gravity: center
  fullscreen: true
